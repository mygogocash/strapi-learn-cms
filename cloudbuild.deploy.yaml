# Build image, push to Artifact Registry, deploy to Cloud Run (production).
#
# Requires substitution _SQL_INSTANCE (Cloud SQL connection name), e.g.:
#   gogocash-cms:asia-southeast1:YOUR_INSTANCE_ID
#
# Prereqs: secrets in Secret Manager (see docs in landing repo / README),
# Artifact Registry repo `strapi`, Cloud Build SA granted run.admin + serviceAccountUser.
#
# Submit manually:
#   gcloud builds submit --project=gogocash-cms --config=cloudbuild.deploy.yaml \
#     --substitutions=_SQL_INSTANCE=gogocash-cms:asia-southeast1:YOUR_INSTANCE
#
# Or use GitHub Actions (.github/workflows/deploy-gcp.yml).

substitutions:
  _REGION: asia-southeast1
  _AR_REPO: strapi
  _SERVICE: strapi
  _SQL_INSTANCE: gogocash-cms:asia-southeast1:REPLACE_WITH_CLOUDSQL_INSTANCE
  _DATABASE_NAME: strapi
  _DATABASE_USERNAME: strapi

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --project=$PROJECT_ID
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_SQL_INSTANCE}
      - --set-env-vars=NODE_ENV=production,DATABASE_CLIENT=postgres,CLOUDSQL_CONNECTION_NAME=${_SQL_INSTANCE},DATABASE_NAME=${_DATABASE_NAME},DATABASE_USERNAME=${_DATABASE_USERNAME}
      - --set-secrets=DATABASE_PASSWORD=DATABASE_PASSWORD:latest,APP_KEYS=APP_KEYS:latest,API_TOKEN_SALT=API_TOKEN_SALT:latest,ADMIN_JWT_SECRET=ADMIN_JWT_SECRET:latest,TRANSFER_TOKEN_SALT=TRANSFER_TOKEN_SALT:latest,JWT_SECRET=JWT_SECRET:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest
      - --memory=2Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --port=8080

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
